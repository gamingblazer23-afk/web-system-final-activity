<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    
    <div class="sidebar">
        <a href="index.html"><i class="bi bi-bar-chart"></i></a>
        <a href="market.html"><i class="bi bi-graph-up"></i></a>
        <a href="trades.html"><i class="bi bi-currency-exchange"></i></a>
        <a href="news.html"><i class="bi bi-newspaper"></i></a>
        <a href="profile.html"><i class="bi bi-gear"></i></a>
    </div>

    
    <div class="container main-content d-flex justify-content-center align-items-center" style="height: 80vh;">

        <div class="profile-card">
            <img src="images/profileion.jpg" class="profile-img mb-3">

            <h4>Llyton Ngail</h4>
            <p>Email: livethelifeofluxury@gmail.com</p>

            <button class="btn btn-dark mt-3" data-bs-toggle="modal" data-bs-target="#editModal">
                Edit Profile
            </button>
        </div>

    </div>

    
    <div class="modal fade" id="editModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Edit Profile</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" class="form-control mb-2" placeholder="Name">
                    <input type="email" class="form-control mb-2" placeholder="Email">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary">Save</button>
                </div>

            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
