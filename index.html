<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="sidebar">
        <a href="index.html"><i class="bi bi-bar-chart"></i></a>
        <a href="market.html"><i class="bi bi-graph-up"></i></a>
        <a href="trades.html"><i class="bi bi-currency-exchange"></i></a>
        <a href="news.html"><i class="bi bi-newspaper"></i></a>
        <a href="profile.html"><i class="bi bi-gear"></i></a>
    </div>

    <div class="container main-content">

        <div class="row text-center">

            <div class="col-md-4 mb-4">
                <div class="crypto-card">
                    <img src="images/btc.png" width="40">
                    <h5>Bitcoin</h5>
                    <h2>$70,632.81</h2>
                    <p class="text-success">▲ 3.8%</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="crypto-card">
                    <img src="images/eth.png" width="40">
                    <h5>Ethereum</h5>
                    <h2>$2,133.07</h2>
                    <p class="text-success">▲ 4.3%</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="crypto-card">
                    <img src="images/usdt.png" width="40">
                    <h5>Tether</h5>
                    <h2>$0.9998</h2>
                    <p class="text-danger">▼ 0.0%</p>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <img src="images/chart.jpg" class="img-fluid rounded" width="600">
        </div>

    </div>

</body>

</html>
